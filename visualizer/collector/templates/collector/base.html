<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Artefacto Visualizer{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: #161b22;
            padding: 20px 0;
            border-bottom: 1px solid #30363d;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #58a6ff;
            font-size: 2em;
        }
        
        h2 {
            color: #58a6ff;
            margin: 20px 0 10px 0;
            font-size: 1.5em;
        }
        
        h3 {
            color: #79c0ff;
            margin: 15px 0 10px 0;
            font-size: 1.2em;
        }
        
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .execution-item {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        
        .execution-item:hover {
            border-color: #58a6ff;
            transform: translateX(5px);
        }
        
        .execution-item a {
            color: #58a6ff;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: bold;
        }
        
        .execution-item a:hover {
            text-decoration: underline;
        }
        
        .meta {
            color: #8b949e;
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.85em;
            margin-right: 5px;
        }
        
        .badge-vm {
            background: #da3633;
            color: white;
        }
        
        .badge-physical {
            background: #238636;
            color: white;
        }
        
        .badge-edr {
            background: #f85149;
            color: white;
        }
        
        details {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 10px;
        }
        
        summary {
            cursor: pointer;
            font-weight: bold;
            color: #58a6ff;
            padding: 5px;
            user-select: none;
        }
        
        summary:hover {
            color: #79c0ff;
        }
        
        .detail-content {
            margin-top: 10px;
            padding: 10px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
        }
        
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #30363d;
        }
        
        th {
            background: #161b22;
            color: #58a6ff;
            font-weight: bold;
        }
        
        tr:hover {
            background: #161b22;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin: 15px 0;
        }
        
        .info-item {
            background: #0d1117;
            padding: 10px;
            border-radius: 4px;
            border-left: 3px solid #58a6ff;
        }
        
        .info-label {
            color: #8b949e;
            font-size: 0.9em;
        }
        
        .info-value {
            color: #c9d1d9;
            font-weight: bold;
            margin-top: 3px;
        }
        
        .list-item {
            background: #0d1117;
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 4px;
            border-left: 2px solid #30363d;
        }
        
        .hooked {
            border-left-color: #f85149;
        }
        
        .screenshot {
            max-width: 100%;
            border: 1px solid #30363d;
            border-radius: 6px;
            margin-top: 10px;
        }
        
        code {
            background: #0d1117;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            color: #79c0ff;
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #58a6ff;
            text-decoration: none;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>🔍 Artefacto Visualizer</h1>
        </div>
    </header>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
